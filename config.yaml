params:
  title: "Borys Łangowicz's Portfolio"
  description: Welcome to my personal portfolio website showcasing my journey and accomplishments as a passionate computer science student! This repository hosts the code for my interactive and dynamic portfolio website, designed to highlight my skills, projects, and experiences in the world of technology.
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # color:
  #   textColor:
  #   secondaryTextColor:
  #   backgroundColor:
  #   secondaryBackgroundColor:
  #   primaryColor:
  #   secondaryColor:

  #   darkmode:
  #     textColor:
  #     secondaryTextColor:
  #     backgroundColor:
  #     secondaryBackgroundColor:
  #     primaryColor:
  #     secondaryColor:

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Borys Łangowicz" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Borys."
    subtitle: "I build things for the web"
    content: "A passionate web app developer. I tend to make use of modern web technologies to build websites that looks great, feels fantastic, and functions correctly."
    image: /images/hero.svg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "#"
      download: true
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/neloduka-sobe
        - icon: fab fa-linkedin
          url: https://https://www.linkedin.com/in/borys-langowicz/
      customIcons:
        - icon: /fav.png
          url: "https://neloduka-sobe.github.io"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a software developer with a passion for web development. I have a background in computer science and mathematics, and I have a strong interest in the intersection of technology and art. I am currently working as a software developer at [example org.](https://example.com) in San Francisco, CA. 

      I am currently working on a project that will be used to help people find the best way to get around the city.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "Docker"
        - "Git"
        - "Linux"
        - "SQL"
        - "Vim"
        - "WordPress"

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Bachelor of Science in Computer Science"
        school:
          name: "University of Toronto"
          url: "https://utoronto.ca"
        date: "2023 - present"

      - title: "High School"
        school:
          name: "II LICEUM OGÓLNOKSZTAŁCĄCE im. Mikołaja Kopernika w Lesznie z Oddziałami Dwujęzycznymi i Międzynarodowymi"
          url: "http://liceum.kopernik-leszno.pl/"
        date: "2019 - 2023"
        GPA: "6.0 out of 6.0"
        content: |-
            High School Diploma, HL Math, HL Computer Science and HL English. 
            </br>
            Primus Inter Pares award for the best graduate of the year
  # Achievements
  achievements:
    enable: true
    # title: "Custom Name"
    items:
      - title: High School Business Challenge
        content: As a participant in the 8th edition of the High School Business Challenge, I had the opportunity to compete against high school students from across Central and Eastern Europe, including Poland, Hungary, the Czech Republic, and Slovakia. This competition - the largest of its kind in the region, presented me with real business challenges that tested my knowledge, creativity, and soft skills. Not only was I able to improve my skills, but I also gained valuable business experience. 
        image: /images/achievment.jpg

      - title: Advent of Math finalist
        content: I competed in a math contest containing a series of academic-level math problems published once a day and to be solved in the next twenty-four hours for four weeks straight. After a great deal of competition, I ended it in the first ten of circa thousand best high schoolers from my country. Not only did I broaden my understanding of complex math problems, but I also hardened my inner perseverance during this contest.
        image: /images/achievment.jpg
      - title: "Winner of the Jobs of the Future - Destination: Mars contest"
        content: "In June 2021, I was part of the winning team in the Jobs of the Future - Destination: Mars contest, organized by Wrocław University of Science and Technology. Along with two other teammates, we submitted an idea for a medical specialist who could mitigate the effects of muscle atrophy in the low-gravity environment of Mars, recognized by the jury as both innovative and feasible. This contest presented a unique challenge that required me to exercise my creativity and problem-solving skills. Working as part of a team also allowed me to develop my teamwork skills and collaborate effectively with others."
        image: /images/achievment.jpg

      - title: Winner of the Start-up Competiton
        content: As a leader of the team of four, I immensely contributed to being awarded 1st place for best start-up business plan in terms of innovation, finances, technical facets, and sustainability of the final product. The project was aimed at the renewable energy market to enhance the safety of solar installations and mitigate the risk of electrocution by damaged or misused solar panels.
        image: /images/achievment.jpg

      - title: Finalist of KOALA math contest
        content: In May 2021, I had the opportunity to participate in the KOALA math contest, a three-stage competition organized by the math department of Adam Mickiewicz University. The competition covered topics in combinatorics, algorithmic thinking, and mathematical logic and required a high level of skill and knowledge. Through hard work and determination, I was able to advance to the finals as part of a team of four highly skilled individuals. This experience was a valuable and enriching opportunity to showcase my expertise in these areas and test my abilities against other talented competitors. I am honored to have been a finalist in such an event.
        image: /images/achievment.jpg

  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: "Repository of example solutions for an official problem set for the Matura exam"
        content: "The repository aims to help other computer science enthusiasts learn algorithms required for the polish Matura exam and comprehend algorithm thinking by resolving official problem sets. I have been committing to this project as I have been preparing for the exam on myself."
        image: /images/projects/matura.png
        featured:
          name: Link
          link: https://github.com/neloduka-sobe/matura-informatyka
        badges:
          - "Python"
          - "SQL"
          - "Linux"
          - "Excel"
        links:
          - icon: fa fa-envelope
            url:  mailto:?subject=Matura%20Infromatyka%20repozytorium&body=Link%3Ahttps%3A%2F%2Fgithub.com%2Fneloduka-sobe%2Fmatura-informatyka  
          - icon: fab fa-github
            url: https://github.com/neloduka-sobe/matura-informatyka
          - icon: fab fa-twitter
            url: https://twitter.com/intent/tweet?text=Check+it+out:&url=https%3A%2F%2Fgithub.com%2Fneloduka-sobe%2Fmatura-informatyka

      - title: Searching engine for Lex Fridman Podcast
        content: Search engine created using Python3, Flask, MariaDB, Docker, YoutubeAPI, Scrapetube, and Spacy to search for occurrences of specific words in Lex Fridman Podcast, allowing both searches for the episode as well as a timestamp of the quote. I was inspired by Kalle Hallden's GoRogan concept and elaborated on it by providing timestamps of searched phrases in specific episodes.
        image: /images/projects/lex.png
        badges:
          - "Flask"
          - "MariaDB"
          - "Docker"
          - "Python"
          - "YoutubeAPI"
        featured:
          name: Link
          link: https://github.com/neloduka-sobe/LexSearch
        links:
          - icon: fab fa-github
            url: https://github.com/neloduka-sobe/LexSearch

      - title: Weather Station
        content: Built upon Raspberry Pi weather station system programmed in python using the official GPIO library. Designed to state light intensity and wind speed every minute and save it for later inspection. Not only did this project provide the possibility to apply knowledge of physics, Linux, and programming, but also to design and create a proof of concept and challenge my creativity, using recycled goods as a base.
        image: /images/projects/weather_station.jpg
        featured:
          name: Link
          link: https://github.com/neloduka-sobe/weather-station
        badges:
          - "Python"
          - "RaspberryPi"
          - "Electronics"
        links:
          - icon: fab fa-github
            url: https://github.com/neloduka-sobe/weather-station

